services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: profmatch
      POSTGRES_PASSWORD: profmatch
      POSTGRES_DB: profmatch
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db, redis]
    # Anonymous volume keeps the container's .venv from being shadowed by the host's.
    volumes: [".:/code", "/code/.venv"]

  worker:
    build: .
    command: arq app.workers.worker.WorkerSettings
    env_file: .env
    depends_on: [db, redis]
    volumes: [".:/code", "/code/.venv"]

volumes:
  pgdata:
